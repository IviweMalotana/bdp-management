# BDP — Nginx site config. Place at /etc/nginx/sites-available/bedifferentpackaging.conf
#   ln -s /etc/nginx/sites-available/bedifferentpackaging.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# Then run certbot (see README) — `certbot --nginx` auto-adds the 443 blocks + HTTP→HTTPS redirect.

# ── API ──────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.bedifferentpackaging.com;

    client_max_body_size 25M;   # artwork uploads

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ── Storefront (Next.js) — apex + www ────────────────────────────────────────
server {
    listen 80;
    server_name bedifferentpackaging.com www.bedifferentpackaging.com;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;   # HMR/websockets
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ── Admin portal (static React/Vite SPA) ─────────────────────────────────────
server {
    listen 80;
    server_name admin.bedifferentpackaging.com;

    root  /var/www/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA fallback for react-router
    }

    # cache hashed assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
